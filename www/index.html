<style>
:root{--bg:#f5f7fa;--card:#fff;--primary:#4A90D9;--primary-light:#e8f0fb;--success:#52c41a;--success-light:#f0fbe8;--danger:#e24b4a;--danger-light:#fcebeb;--warning:#ef9f27;--warning-light:#feefd8;--text:#1a1a1a;--text2:#666;--text3:#999;--border:#e8e8e8;--radius:12px;--radius-sm:8px;--shadow:0 2px 12px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;padding-bottom:calc(80px + env(safe-area-inset-bottom, 24px));user-select:none}
.page{display:none;padding:16px;padding-bottom:calc(24px + env(safe-area-inset-bottom, 24px));animation:fadeIn .25s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.tab-bar{position:fixed;bottom:0;left:0;right:0;min-height:56px;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100;padding:6px 0 calc(6px + env(safe-area-inset-bottom, 20px))}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .2s;color:var(--text3);font-size:10px;border:none;background:none}
.tab-item.active{color:var(--primary)}
.tab-item svg{width:24px;height:24px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 24px;border-radius:var(--radius-sm);font-size:15px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:active{background:#3a7bc8}
.btn-outline{background:var(--card);color:var(--primary);border:1.5px solid var(--primary)}
.btn-outline:active{background:var(--primary-light)}
.btn-lg{width:100%;padding:14px 24px;font-size:16px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.char-display{font-size:72px;text-align:center;padding:24px 0;font-family:"Noto Serif CJK SC","Source Han Serif SC","STKaiti","KaiTi","SimSun",serif;font-weight:700}
.char-display.small{font-size:48px}
.pinyin-display{text-align:center;font-size:22px;color:var(--primary);margin-bottom:8px;letter-spacing:2px}
.words-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:12px 0}
.word-tag{background:var(--primary-light);color:var(--primary);padding:6px 14px;border-radius:20px;font-size:14px}
.quiz-option{font-family:"Noto Serif CJK SC","Source Han Serif SC","STKaiti","KaiTi","SimSun",serif}
.char-grid-item{font-family:"Noto Serif CJK SC","Source Han Serif SC","STKaiti","KaiTi","SimSun",serif}
.sentence-box{text-align:center;color:var(--text2);font-size:15px;padding:10px;background:var(--bg);border-radius:var(--radius-sm);line-height:1.6}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-card{text-align:center;padding:16px 8px}
.stat-card .num{font-size:32px;font-weight:700;color:var(--primary)}
.stat-card .label{font-size:12px;color:var(--text3);margin-top:4px}
.unit-list{display:flex;flex-direction:column;gap:10px}
.unit-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer}
.unit-item:active{background:var(--primary-light)}
.unit-info h4{font-size:15px;margin-bottom:4px}
.unit-info p{font-size:12px;color:var(--text3)}
.unit-badge{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:500}
.unit-badge.mastered{background:var(--success-light);color:var(--success)}
.unit-badge.learning{background:var(--warning-light);color:var(--warning)}
.unit-badge.locked{background:var(--bg);color:var(--text3)}
.grade-selector{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.grade-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text2);white-space:nowrap}
.grade-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.quiz-option{padding:18px 12px;border-radius:var(--radius);border:2px solid var(--border);background:var(--card);font-size:28px;text-align:center;cursor:pointer;transition:all .2s;font-family:"KaiTi","STKaiti","楷体",serif;min-height:72px;display:flex;align-items:center;justify-content:center}
.quiz-option:active{transform:scale(.96)}
.quiz-option.correct{background:var(--success-light);border-color:var(--success);color:var(--success)}
.quiz-option.wrong{background:var(--danger-light);border-color:var(--danger);color:var(--danger);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.quiz-progress{display:flex;gap:4px;justify-content:center;margin:12px 0}
.progress-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all .2s}
.progress-dot.done{background:var(--success)}
.progress-dot.current{background:var(--primary);transform:scale(1.3)}
.progress-dot.wrong-dot{background:var(--danger)}
.review-queue{text-align:center;padding:32px 16px}
.review-queue .big-num{font-size:64px;font-weight:700;color:var(--primary);line-height:1}
.review-queue .hint{font-size:15px;color:var(--text2);margin-top:8px}
.achievement-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.achievement-item{text-align:center;padding:16px 8px;background:var(--bg);border-radius:var(--radius-sm)}
.achievement-item.earned{background:var(--primary-light)}
.achievement-item .icon{font-size:32px;margin-bottom:6px}
.achievement-item .name{font-size:11px;color:var(--text2)}
.achievement-item.locked{opacity:.4}
.char-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}
.char-grid-item{padding:10px 4px;text-align:center;font-size:24px;background:var(--card);border-radius:var(--radius-sm);font-family:"KaiTi","STKaiti","楷体",serif;cursor:pointer}
.char-grid-item:active{background:var(--primary-light)}
.char-grid-item.mastered{border:2px solid var(--success)}
.char-grid-item.reviewing{border:2px solid var(--warning)}
.char-grid-item.new{border:2px solid var(--border)}
.hanzi-stage{width:100%;max-width:280px;margin:0 auto 16px;border-radius:var(--radius);overflow:hidden;background:var(--card);aspect-ratio:1;position:relative}
.swipe-hint{text-align:center;color:var(--text3);font-size:12px;margin-top:8px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal-sheet{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:500px;padding:20px;max-height:70vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,20px)}
.modal-title{font-size:17px;font-weight:600;text-align:center;margin-bottom:16px}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.quick-action{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 12px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer;border:none;text-align:center}
.quick-action:active{background:var(--primary-light)}
.quick-action .icon{font-size:36px}
.quick-action .label{font-size:14px;font-weight:500}
.quick-action .sub{font-size:11px;color:var(--text3)}
.mode-selector{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.mode-btn{flex:1;min-width:80px;padding:10px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text2);white-space:nowrap;text-align:center}
.mode-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.streak-flame{display:inline-block;animation:flame .6s ease-in-out infinite alternate}
@keyframes flame{from{transform:scale(1)}to{transform:scale(1.15)}}
@media(display-mode:standalone){body{padding-top:env(safe-area-inset-top)}}
</style>
</head>

<script>
// ==================== WebView 兼容层 ====================
// alert/confirm 在 Android WebView 中默认不工作，用 DOM 弹窗代替
function showToast(msg, duration) {
  duration = duration || 2000;
  let t = document.getElementById('toast-msg');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast-msg';
    t.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);color:#fff;padding:12px 24px;border-radius:8px;font-size:15px;z-index:9999;pointer-events:none;transition:opacity .3s;text-align:center;max-width:80vw';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.display = 'block';
  clearTimeout(t._tid);
  t._tid = setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.style.display = 'none'; }, 300); }, duration);
}

function showConfirm(msg, onOk, onCancel) {
  let m = document.getElementById('confirm-modal');
  if (!m) {
    m = document.createElement('div');
    m.id = 'confirm-modal';
    m.innerHTML = '<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:9998;display:flex;align-items:center;justify-content:center" id="confirm-overlay"><div style="background:#fff;border-radius:12px;padding:24px;max-width:300px;width:90%;text-align:center"><p id="confirm-text" style="font-size:15px;margin-bottom:20px;color:#1a1a1a"></p><div style="display:flex;gap:10px"><button id="confirm-cancel" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:15px">取消</button><button id="confirm-ok" style="flex:1;padding:10px;border:none;border-radius:8px;background:#4A90D9;color:#fff;font-size:15px">确定</button></div></div></div>';
    document.body.appendChild(m);
  }
  m.style.display = 'block';
  document.getElementById('confirm-text').textContent = msg;
  document.getElementById('confirm-overlay').onclick = function(e) { if (e.target === this) { m.style.display = 'none'; if (onCancel) onCancel(); } };
  document.getElementById('confirm-ok').onclick = function() { m.style.display = 'none'; if (onOk) onOk(); };
  document.getElementById('confirm-cancel').onclick = function() { m.style.display = 'none'; if (onCancel) onCancel(); };
}

// ==================== 应用状态 ====================
const STORAGE_KEY = 'shizibao_data';
let appData = loadData();
let currentGrade = 1;
let currentVol = '上';
let currentPage = 'home';
let quizChars = [];
let quizIndex = 0;
let quizResults = [];
let currentCharData = null;
let hanziWriter = null;
let currentChar = null;
let learnModeUnits = [];

function defaultData() {
  return {
    chars: {},        // char -> {state,correct,wrong,lastReview,nextReview,interval,ease}
    streak: 0,
    lastStudyDate: '',
    totalPractice: 0,
    achievements: {}
  };
}

function deepMerge(target, source) {
  let out = {};
  for (let k of Object.keys(target)) { out[k] = target[k]; }
  for (let k of Object.keys(source)) {
    if (source[k] && typeof source[k] === 'object' && !Array.isArray(source[k]) && target[k] && typeof target[k] === 'object') {
      out[k] = deepMerge(target[k], source[k]);
    } else {
      out[k] = source[k];
    }
  }
  return out;
}

function loadData() {
  try {
    let d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!d || !d.chars) return defaultData();
    // 迁移旧复合键 → 新纯字键
    let migrated = {};
    let needMigrate = false;
    for (let k of Object.keys(d.chars)) {
      if (k.includes('_')) {
        needMigrate = true;
        let parts = k.split('_');
        let newKey = parts[parts.length - 1];
        if (!migrated[newKey]) migrated[newKey] = d.chars[k];
        else {
          let old = migrated[newKey], cur = d.chars[k];
          migrated[newKey] = {
            state: old.state === 'mastered' || cur.state === 'mastered' ? 'mastered' : (old.state === 'reviewing' || cur.state === 'reviewing' ? 'reviewing' : 'new'),
            correct: (old.correct || 0) + (cur.correct || 0),
            wrong: (old.wrong || 0) + (cur.wrong || 0),
            lastReview: [old.lastReview, cur.lastReview].filter(Boolean).sort().pop() || null,
            nextReview: [old.nextReview, cur.nextReview].filter(Boolean).sort()[0] || todayStr(),
            interval: Math.max(old.interval || 0, cur.interval || 0),
            ease: Math.max(old.ease || 2.5, cur.ease || 2.5)
          };
        }
      } else {
        migrated[k] = d.chars[k];
      }
    }
    if (needMigrate) { d.chars = migrated; }
    return deepMerge(defaultData(), d);
  } catch(e) { return defaultData(); }
}

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

function charKey(c) { return c.c; }

function getCharState(ch) {
  let k = charKey(ch);
  if (!appData.chars[k]) {
    appData.chars[k] = {state:'new', correct:0, wrong:0, lastReview:null, nextReview:todayStr(), interval:0, ease:2.5};
  }
  return appData.chars[k];
}

function todayStr() { return new Date().toISOString().slice(0,10); }

// ==================== SRS 算法 ====================
function srsUpdate(ch, correct) {
  let k = charKey(ch);
  let s = getCharState(ch);
  let today = todayStr();
  let sameDay = s.lastReview === today;
  s.lastReview = today;
  if (correct) {
    s.correct++;
    if (!sameDay) {
      if (s.state === 'new' || s.interval === 0) s.interval = 1;
      else s.interval = Math.round(s.interval * s.ease);
      s.ease = Math.min(3, s.ease + 0.1);
    }
    s.state = s.interval >= 30 ? 'mastered' : 'reviewing';
  } else {
    s.wrong++;
    if (!sameDay) {
      s.interval = 1;
      s.ease = Math.max(1.3, s.ease - 0.2);
    }
    s.state = 'reviewing';
  }
  let d = new Date();
  d.setDate(d.getDate() + s.interval);
  s.nextReview = d.toISOString().slice(0,10);
  saveData();
}

function getReviewQueue() {
  let today = todayStr();
  return ALL_CHARS.filter(ch => {
    let s = appData.chars[charKey(ch)];
    return s && s.state !== 'new' && s.nextReview <= today;
  });
}

function getLearned() {
  return ALL_CHARS.filter(ch => {
    let s = appData.chars[charKey(ch)];
    return s && s.state !== 'new';
  });
}

function checkStreak() {
  let today = todayStr();
  let yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  let ys = yesterday.toISOString().slice(0,10);
  if (appData.lastStudyDate === today) return;
  if (appData.lastStudyDate === ys) appData.streak++;
  else appData.streak = 1;
  appData.lastStudyDate = today;
  saveData();
}

<div class="unit-info"><h4>${u.n}</h4><p>${u.total}个字 · 已学${u.learned} · 掌握${u.mastered}</p></div>

function showLearnChar(idx) {
  if (idx < 0) idx = 0;
  if (idx >= learnModeUnits.length) {
    closeCharModal();
    checkStreak();
    checkAchievements();
    switchPage('home');
    return;
  }
  let ch = learnModeUnits[idx];
  currentCharData = ch;
  currentChar = ch.c;
  document.getElementById('modal-char').textContent = ch.c;
  document.getElementById('modal-pinyin').textContent = ch.p;
  document.getElementById('modal-words').innerHTML = ch.w.map(w => `<span class="word-tag" onclick="playWord('${w}')" style="cursor:pointer">🔊 ${w}</span>`).join('');
  document.getElementById('modal-sentence').textContent = ch.s || '';
  document.getElementById('hanzi-writer-container').innerHTML = '';

  // Mark as started
  let s = getCharState(ch);
  if (s.state === 'new') s.state = 'reviewing';

  // Hanzi Writer
  let charEl = document.getElementById('hanzi-writer-container');
  setTimeout(() => {
    try {
      hanziWriter = HanziWriter.create('hanzi-writer-container', ch.c, {
        width: 280, height: 280, padding: 5,
        showOutline: true, strokeAnimationSpeed: 1,
        delayBetweenStrokes: 100,
        strokeColor: '#333', outlineColor: '#ddd',
        radicalColor: null
      });
      // 3s fallback: if data load from CDN failed, show static char
      setTimeout(() => {
        let c = document.getElementById('hanzi-writer-container');
        if (c && !c.querySelector('canvas') && !c.querySelector('svg')) {
          showStaticChar(ch.c);
        }
      }, 3000);
    } catch(e) { showStaticChar(ch.c); }
  }, 100);

  // Swipe: 用 named function + addEventListener，避免闭包冲突
  let overlay = document.getElementById('char-modal');
  window.__swipeIdx = idx;
  overlay.removeEventListener('touchstart', _swipeStart);
  overlay.removeEventListener('touchend', _swipeEnd);
  overlay.addEventListener('touchstart', _swipeStart, {passive:true});
  overlay.addEventListener('touchend', _swipeEnd, {passive:true});
}

function _swipeStart(e) { window.__swipeX = e.touches[0].clientX; }
function _swipeEnd(e) {
  let t = e.target;
  if (t && (t.tagName === 'BUTTON' || t.tagName === 'CANVAS' || t.closest('button'))) return;
  let dx = e.changedTouches[0].clientX - (window.__swipeX || 0);
  if (Math.abs(dx) > 50) {
    let idx = window.__swipeIdx || 0;
    if (dx < -30) showLearnChar(idx + 1);
    else if (dx > 30) showLearnChar(idx - 1);
  }
}

let speechReady = false;
function initSpeech() {
  if (typeof speechSynthesis === 'undefined') return;
  speechSynthesis.onvoiceschanged = () => {
    if (speechSynthesis.getVoices().some(v => v.lang.startsWith('zh'))) speechReady = true;
  };
  setTimeout(() => {
    if (speechSynthesis.getVoices().some(v => v.lang.startsWith('zh'))) speechReady = true;
  }, 500);
}

function speakChar() {
  if (!currentCharData) return;
  let char = currentCharData.c;
  // 方案一：系统语音引擎（即时）
  try {
    speechSynthesis.cancel();
    let u = new SpeechSynthesisUtterance(char);
    u.lang = 'zh-CN'; u.rate = 0.5; u.pitch = 1.1; u.volume = 1;
    let zh = speechSynthesis.getVoices().find(v => v.lang.startsWith('zh'));
    if (zh) u.voice = zh;
    let fired = false;
    u.onstart = () => { fired = true; };
    u.onerror = () => { if (!fired) { fired = true; playBaiduTTS(char); } };
    speechSynthesis.speak(u);
    setTimeout(() => { if (!fired) { fired = true; playBaiduTTS(char); } }, 800);
    return;
  } catch(e) { playBaiduTTS(char); }
}

function playBaiduTTS(char) {
  let a = document.getElementById('tts-audio');
  // 尝试有道 TTS（小米浏览器对百度域名的拦截较少）
  a.src = 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(char) + '&le=zh';
  a.load();
  let p = a.play();
  if (p) p.catch(() => {});
}

function playWord(word) {

}

// ==================== 练习页 ====================
function startPractice() {
  let pool = getLearned();
  if (pool.length < 4) pool = ALL_CHARS.slice(0, 20);
  if (pool.length < 4) return showToast('数据太少，请先学习一些字', 2500);
  shuffle(pool);
  quizChars = pool.slice(0, 10);
  quizIndex = 0;
  quizResults = [];
  quizLocked = false;
  appData.totalPractice++;
  saveData();
  renderQuiz();
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) { let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

function renderQuiz() {
  if (quizIndex >= quizChars.length) { showResults(); return; }
  let ch = quizChars[quizIndex];
  let options = getOptions(ch);
  let html = `
<div style="text-align:center;margin-bottom:8px;font-size:13px;color:var(--text3)">第 ${quizIndex+1} / ${quizChars.length} 题</div>
<div class="quiz-progress">${quizChars.map((_,i)=>{
  let cls = i<quizIndex ? (quizResults[i]?'done':'wrong-dot') : (i===quizIndex?'current':'');
  return `<div class="progress-dot ${cls}"></div>`;
}).join('')}</div>
<div class="pinyin-display" style="font-size:28px;margin-top:12px">${ch.p}</div>
<div class="quiz-options">
${options.map((o,i) => `<div class="quiz-option" id="opt-${i}" onclick="answerQuiz('${o.c}',${i})">${o.c}</div>`).join('')}
</div>
`;
  document.getElementById('quiz-area').innerHTML = html;
  document.getElementById('page-practice').classList.add('active');
}

function getOptions(correct) {
  let others = ALL_CHARS.filter(x => x.c !== correct.c);
  shuffle(others);
  let options = [correct, ...others.slice(0,3)];
  return shuffle(options);
}

let quizLocked = false;

function answerQuiz(ans, idx) {
  if (quizLocked) return;
  quizLocked = true;
  let ch = quizChars[quizIndex];
  let correct = ans === ch.c;
  quizResults.push(correct);
  srsUpdate(ch, correct);

  let el = document.getElementById('opt-'+idx);
  if (correct) el.classList.add('correct');
  else {
    el.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(opt => {
      if (opt.textContent === ch.c) opt.classList.add('correct');
    });
  }

  setTimeout(() => {
    quizIndex++;
    quizLocked = false;
    renderQuiz();
  }, correct ? 500 : 1000);
}

function showResults() {
  let correct = quizResults.filter(r=>r).length;
  checkStreak();
  checkAchievements();
  saveData();
  let emoji, title;
  if (correct === 10) { emoji = '🎉'; title = '太厉害了！全对！'; }
  else if (correct >= 8) { emoji = '👍'; title = '非常棒！'; }
  else if (correct >= 6) { emoji = '💪'; title = '还不错！继续加油！'; }
  else { emoji = '📚'; title = '多练几次就好了！'; }
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-detail').innerHTML = `
正确 <b style="color:var(--success);font-size:24px">${correct}</b> / ${quizChars.length} 题`;
  document.getElementById('result-modal').style.display = 'flex';
}

  document.getElementById('result-modal').style.display = 'none';
  document.getElementById('quiz-area').innerHTML = `

  let a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '识字宝_进度备份_' + todayStr() + '.json';
  a.click();
}

function importData(e) {
  let file = e.target.files[0];
  if (!file) return;
  let reader = new FileReader();
  reader.onload = function(ev) {
    try {
      let data = JSON.parse(ev.target.result);
      if (!data.chars) throw new Error('无效的备份文件');
      showConfirm('导入将覆盖当前学习进度，确定继续？', function() {
        appData = deepMerge(defaultData(), data);
        saveData();
        showToast('导入成功！');
        switchPage('me');
      });
    } catch(err) { showToast('文件格式错误，请选择识字宝导出的备份文件。', 2500); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ==================== 初始化 ====================
function init() {
  initSpeech();
  renderHome();
}

// Service Worker 注册
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

init();
</script>
